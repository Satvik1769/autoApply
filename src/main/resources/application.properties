spring.application.name=autoApply
server.port=${PORT:8080}
spring.main.web-application-type=servlet

# DataSource  (Supabase Postgres)
# SUPABASE_DB_HOST  → e.g. db.xxxxxxxxxxxx.supabase.co
# SUPABASE_DB_NAME  → postgres  (default Supabase DB name)
# SUPABASE_DB_USER  → postgres
# SUPABASE_DB_PASSWORD → your DB password (Project Settings → Database)
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway  (set FLYWAY_ENABLED=true on first run to create tables)
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

# Spring Session  (JDBC)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.timeout=${SESSION_TIMEOUT:7200s}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# OAuth2 — Google
# console.cloud.google.com → APIs & Services → Credentials → OAuth 2.0 Client ID
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# OAuth2 — GitHub
# github.com → Settings → Developer settings → OAuth Apps
# Callback URL: http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.ai.provider=${AI_PROVIDER:openai}

# OpenAI — active when AI_PROVIDER=openai (default)
# Get key: platform.openai.com/api-keys
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}

# Anthropic (Claude) — active when AI_PROVIDER=anthropic
# Get key: console.anthropic.com/settings/keys
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
spring.ai.anthropic.chat.options.max-tokens=${ANTHROPIC_MAX_TOKENS:2048}

# Gemini (Google AI Studio) — active when AI_PROVIDER=gemini
# Get key: aistudio.google.com/app/apikey
app.ai.gemini-api-key=${GEMINI_API_KEY:}
app.ai.gemini-model=${GEMINI_MODEL:gemini-2.0-flash}

app.supabase.url=${SUPABASE_URL}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
app.supabase.anon-key=${SUPABASE_ANON_KEY}
app.supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:resumes}

app.ats.target-words.junior-min=${ATS_JUNIOR_MIN:400}
app.ats.target-words.junior-max=${ATS_JUNIOR_MAX:600}
app.ats.target-words.senior-min=${ATS_SENIOR_MIN:600}
app.ats.target-words.senior-max=${ATS_SENIOR_MAX:1000}
app.ats.years-experience-threshold=${ATS_YEARS_THRESHOLD:5}
